<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能会议管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(2, 8, 20, 0.4);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #0ea5e9, #8b5cf6);
            animation: gradientShift 8s infinite linear;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e0f2fe, #bae6fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            color: #cbd5e1;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(2, 8, 20, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(2, 8, 20, 0.5);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .card-title {
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e0f2fe;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-active {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .status-warning {
            background: #fbbf24;
            box-shadow: 0 0 10px #fbbf24;
        }

        .status-inactive {
            background: #94a3b8;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .real-time-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(15, 23, 42, 0.7);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .stat-label {
            font-size: 0.9em;
            color: #94a3b8;
        }

        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }

        .meeting-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .meeting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
            border-left: 4px solid #6366f1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .meeting-item:hover {
            background: rgba(15, 23, 42, 0.7);
            transform: translateX(5px);
        }

        .meeting-item.ongoing {
            border-left-color: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.2);
        }

        .meeting-item.upcoming {
            border-left-color: #38bdf8;
        }

        .meeting-info h4 {
            margin-bottom: 5px;
            color: #e0f2fe;
        }

        .meeting-info p {
            font-size: 0.9em;
            color: #94a3b8;
        }

        .meeting-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .status-ongoing {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
        }

        .status-upcoming {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
        }

        .status-completed {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }

        .control-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
            z-index: -1;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn-primary {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-success {
            background: linear-gradient(45deg, #0ea5e9, #38bdf8);
            color: white;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .alert-warning {
            background: rgba(234, 179, 8, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(15, 23, 42, 0.7);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #0ea5e9);
            border-radius: 4px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: progressShine 1.5s infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.1);
            border-radius: 50%;
            border-top-color: #38bdf8;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .control-panel {
                flex-direction: column;
            }
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 由聪明的yangzhe发明的智能会议管理系统</h1>
            <p>实时监控会议状态 | 智能数据分析 | 高效会议管理</p>
        </div>

        <div class="alert alert-success" id="successAlert">
            ✅ 操作成功！
        </div>
        <div class="alert alert-warning" id="warningAlert">
            ⚠️ 检测到异常，请检查设置
        </div>

        <div class="control-panel">
            <button class="btn btn-primary" onclick="startRealTimeMonitoring()">
                <span id="monitorBtn">🔍 开始实时监控</span>
            </button>
            <button class="btn btn-success" onclick="generateReport()">
                📊 生成分析报告
            </button>
            <button class="btn btn-primary" onclick="simulateNewMeeting()">
                ➕ 模拟新会议
            </button>
            <button class="btn btn-success" onclick="exportData()">
                💾 导出数据
            </button>
        </div>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">
                    <span class="status-indicator status-active"></span>
                    实时会议监控
                </div>
                <div class="real-time-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="activeMeetings">3</div>
                        <div class="stat-label">进行中会议</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="participants">127</div>
                        <div class="stat-label">在线参与者</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="avgDuration">45</div>
                        <div class="stat-label">平均时长(分钟)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="efficiency">92%</div>
                        <div class="stat-label">会议效率</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="efficiencyBar" style="width: 92%"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span class="status-indicator status-warning"></span>
                    会议类型分析
                </div>
                <div class="chart-container">
                    <canvas id="meetingTypeChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span class="status-indicator status-active"></span>
                    一周会议趋势
                </div>
                <div class="chart-container">
                    <canvas id="weeklyTrendChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    <span class="status-indicator status-warning"></span>
                    会议列表
                </div>
                <div class="meeting-list" id="meetingList">
                    <!-- 动态生成会议列表 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let isMonitoring = false;
        let monitoringInterval;
        let meetingTypeChart, weeklyTrendChart;

        // 模拟会议数据
        const meetingData = {
            types: {
                labels: ['团队会议', '项目评审', '客户沟通', '培训讲座', '紧急会议'],
                data: [35, 25, 20, 15, 5],
                colors: ['#667eea', '#f093fb', '#f5576c', '#4facfe', '#43e97b']
            },
            weekly: {
                labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                data: [12, 19, 15, 25, 22, 8, 5]
            },
            meetings: [
                { id: 1, title: '产品规划会议', time: '10:00-11:30', participants: 8, status: 'ongoing', type: '团队会议' },
                { id: 2, title: '客户需求评审', time: '14:00-15:00', participants: 5, status: 'upcoming', type: '项目评审' },
                { id: 3, title: '技术培训', time: '16:00-17:30', participants: 15, status: 'upcoming', type: '培训讲座' },
                { id: 4, title: '周例会', time: '09:00-09:30', participants: 12, status: 'completed', type: '团队会议' }
            ]
        };

        // 初始化图表
        function initCharts() {
            // 会议类型饼图
            const ctx1 = document.getElementById('meetingTypeChart').getContext('2d');
            meetingTypeChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: meetingData.types.labels,
                    datasets: [{
                        data: meetingData.types.data,
                        backgroundColor: meetingData.types.colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true,
                                color: '#e2e8f0'
                            }
                        }
                    },
                    cutout: '65%'
                }
            });

            // 一周趋势折线图
            const ctx2 = document.getElementById('weeklyTrendChart').getContext('2d');
            weeklyTrendChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: meetingData.weekly.labels,
                    datasets: [{
                        label: '会议数量',
                        data: meetingData.weekly.data,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0,0,0,0.1)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // 更新会议列表
        function updateMeetingList() {
            const meetingList = document.getElementById('meetingList');
            meetingList.innerHTML = meetingData.meetings.map(meeting => `
                <div class="meeting-item ${meeting.status}" onclick="showMeetingDetails(${meeting.id})">
                    <div class="meeting-info">
                        <h4>${meeting.title}</h4>
                        <p>⏰ ${meeting.time} | 👥 ${meeting.participants}人 | 📂 ${meeting.type}</p>
                    </div>
                    <div class="meeting-status status-${meeting.status}">
                        ${getStatusText(meeting.status)}
                    </div>
                </div>
            `).join('');
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'ongoing': '进行中',
                'upcoming': '即将开始',
                'completed': '已结束'
            };
            return statusMap[status] || '未知';
        }

        // 开始实时监控
        function startRealTimeMonitoring() {
            const btn = document.getElementById('monitorBtn');
            
            if (!isMonitoring) {
                isMonitoring = true;
                btn.innerHTML = '⏸️ 停止监控';
                showAlert('success', '✅ 实时监控已启动');
                
                // 模拟实时数据更新
                monitoringInterval = setInterval(() => {
                    // 随机更新数据
                    const activeMeetings = Math.floor(Math.random() * 5) + 2;
                    const participants = Math.floor(Math.random() * 50) + 100;
                    const avgDuration = Math.floor(Math.random() * 20) + 35;
                    const efficiency = Math.floor(Math.random() * 15) + 85;
                    
                    document.getElementById('activeMeetings').textContent = activeMeetings;
                    document.getElementById('participants').textContent = participants;
                    document.getElementById('avgDuration').textContent = avgDuration;
                    document.getElementById('efficiency').textContent = efficiency + '%';
                    document.getElementById('efficiencyBar').style.width = efficiency + '%';
                    
                    // 随机更新图表数据
                    if (Math.random() > 0.7) {
                        updateChartData();
                    }
                }, 2000);
            } else {
                isMonitoring = false;
                btn.innerHTML = '🔍 开始实时监控';
                clearInterval(monitoringInterval);
                showAlert('warning', '⚠️ 实时监控已停止');
            }
        }

        // 更新图表数据
        function updateChartData() {
            // 更新会议类型数据
            meetingData.types.data = meetingData.types.data.map(value => 
                Math.max(5, value + Math.floor(Math.random() * 6) - 3)
            );
            meetingTypeChart.data.datasets[0].data = meetingData.types.data;
            meetingTypeChart.update('none');
            
            // 更新周趋势数据
            meetingData.weekly.data = meetingData.weekly.data.map(value => 
                Math.max(0, value + Math.floor(Math.random() * 5) - 2)
            );
            weeklyTrendChart.data.datasets[0].data = meetingData.weekly.data;
            weeklyTrendChart.update('none');
        }

        // 生成分析报告
        function generateReport() {
            showAlert('success', '📊 分析报告生成中...');
            
            setTimeout(() => {
                const reportData = {
                    totalMeetings: meetingData.meetings.length,
                    activeMeetings: document.getElementById('activeMeetings').textContent,
                    avgEfficiency: document.getElementById('efficiency').textContent,
                    topMeetingType: meetingData.types.labels[0],
                    recommendation: '建议增加团队会议频率，提升项目评审效率'
                };
                
                console.log('📈 会议分析报告:', reportData);
                showAlert('success', '✅ 分析报告已生成，请查看控制台');
            }, 1500);
        }

        // 模拟新会议
        function simulateNewMeeting() {
            const newMeeting = {
                id: meetingData.meetings.length + 1,
                title: '紧急项目讨论',
                time: `${Math.floor(Math.random() * 12) + 9}:00-${Math.floor(Math.random() * 12) + 10}:30`,
                participants: Math.floor(Math.random() * 10) + 3,
                status: 'upcoming',
                type: '紧急会议'
            };
            
            meetingData.meetings.unshift(newMeeting);
            updateMeetingList();
            showAlert('success', '➕ 新会议已添加');
        }

        // 导出数据
        function exportData() {
            showAlert('success', '💾 数据导出中...');
            
            setTimeout(() => {
                const dataToExport = {
                    meetingStats: {
                        activeMeetings: document.getElementById('activeMeetings').textContent,
                        participants: document.getElementById('participants').textContent,
                        avgDuration: document.getElementById('avgDuration').textContent,
                        efficiency: document.getElementById('efficiency').textContent
                    },
                    meetingTypes: meetingData.types,
                    weeklyTrend: meetingData.weekly,
                    meetings: meetingData.meetings
                };
                
                const dataStr = JSON.stringify(dataToExport, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `meeting_data_${new Date().toISOString().slice(0, 10)}.json`;
                link.click();
                
                showAlert('success', '✅ 数据导出完成');
            }, 1000);
        }

        // 显示会议详情
        function showMeetingDetails(meetingId) {
            const meeting = meetingData.meetings.find(m => m.id === meetingId);
            if (meeting) {
                showAlert('success', `📋 会议详情：${meeting.title}\n时间：${meeting.time}\n参与人数：${meeting.participants}人\n类型：${meeting.type}`);
            }
        }

        // 显示提示信息
        function showAlert(type, message) {
            const alertId = type === 'success' ? 'successAlert' : 'warningAlert';
            const alert = document.getElementById(alertId);
            alert.textContent = message;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            updateMeetingList();
            
            // 添加页面加载动画
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.6s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });

        // 添加键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey) {
                switch(e.key) {
                    case 'm':
                        e.preventDefault();
                        startRealTimeMonitoring();
                        break;
                    case 'r':
                        e.preventDefault();
                        generateReport();
                        break;
                    case 'n':
                        e.preventDefault();
                        simulateNewMeeting();
                        break;
                }
            }
        });
    </script>
</body>
</html>
